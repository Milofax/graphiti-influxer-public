name: Sync to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run gitexporter
        run: npx gitexporter gitexporter.config.json

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          cd ../graphiti-influxer-public
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/Milofax/graphiti-influxer-public.git
          git push public main --force
